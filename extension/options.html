<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ตั้งค่าคีย์ลัด - Text Expansion</title>
  <style>
    :root { --bg: #1a1b26; --card: #24283b; --text: #c0caf5; --muted: #565f89; --accent: #7aa2f7; --danger: #f7768e; --ok: #9ece6a; --input: #414868; }
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 1rem; min-height: 100vh; }
    .wrap { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.35rem; margin: 0 0 1rem; color: var(--accent); }
    .card { background: var(--card); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.25rem; }
    input, select, textarea, button { font-size: 1rem; }
    input, select, textarea { width: 100%; padding: 0.5rem 0.6rem; border: 1px solid var(--input); border-radius: 6px; background: var(--bg); color: var(--text); }
    textarea { min-height: 80px; resize: vertical; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; margin-right: 0.5rem; margin-top: 0.25rem; }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-ghost { background: var(--input); color: var(--text); }
    .msg { padding: 0.5rem; border-radius: 6px; margin-top: 0.5rem; font-size: 0.9rem; }
    .msg.err { background: rgba(247,118,142,0.2); color: var(--danger); }
    .msg.ok { background: rgba(158,206,106,0.2); color: var(--ok); }
    .row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: flex-end; }
    .row > * { flex: 1 1 auto; min-width: 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.5rem 0.6rem; text-align: left; border-bottom: 1px solid var(--input); }
    th { font-size: 0.8rem; color: var(--muted); }
    .loading { color: var(--muted); }
    .hidden { display: none !important; }
    #authSection, #shortcutsSection { margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ตั้งค่าคีย์ลัด (Text Expansion)</h1>

    <div class="card">
      <h2 style="font-size:1rem; margin:0 0 0.5rem;">เข้าสู่ระบบ</h2>
      <div id="authSection">
        <div id="loginForm">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@company.com" />
          <label style="margin-top:0.5rem;">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" />
          <button type="button" class="btn-primary" id="btnLogin">เข้าสู่ระบบ</button>
        </div>
        <div id="loggedIn" class="hidden">
          <span id="userEmail" class="muted"></span>
          <button type="button" class="btn-ghost" id="btnLogout">ออกจากระบบ</button>
        </div>
      </div>
      <div id="authMsg"></div>
    </div>

    <div class="card" id="shortcutsSection">
      <h2 style="font-size:1rem; margin:0 0 0.5rem;">จัดการ Shortcuts</h2>
      <p class="muted" style="font-size:0.9rem;">ต้องเข้าสู่ระบบก่อนจึงจะเพิ่ม/แก้/ลบได้</p>
      <div id="shortcutForm" class="hidden">
        <input type="hidden" id="editId" />
        <label>Command name (ภาษาอังกฤษ)</label>
        <input type="text" id="commandName" placeholder="เช่น greeting" />
        <label style="margin-top:0.5rem;">Shortcut key (คำลัดหรือคีย์ลัด)</label>
        <input type="text" id="shortcutKey" placeholder="เช่น สวัสดี หรือ ctrl+shift+1" />
        <label style="margin-top:0.5rem;">Action text (ข้อความที่จะแทนที่)</label>
        <textarea id="actionText" placeholder="ข้อความที่ต้องการให้ paste"></textarea>
        <label style="margin-top:0.5rem;"><input type="checkbox" id="isGlobal" /> ใช้ได้ทุกหน้า (global)</label>
        <div class="row" style="margin-top:0.5rem;">
          <button type="button" class="btn-primary" id="btnSaveShortcut">บันทึก</button>
          <button type="button" class="btn-ghost" id="btnCancelEdit">ยกเลิก</button>
        </div>
      </div>
      <div id="shortcutListMsg"></div>
      <div id="shortcutListLoading" class="loading hidden">กำลังโหลด...</div>
      <table id="shortcutTable" style="margin-top:1rem;">
        <thead><tr><th>Command</th><th>Shortcut key</th><th>Action text</th><th>Global</th><th></th></tr></thead>
        <tbody id="shortcutTableBody"></tbody>
      </table>
    </div>
  </div>
  <script type="module" src="options.js"></script>
</body>
</html>
