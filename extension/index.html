<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OKACE คีย์ลัด</title>
  <style>
    :root {
      --header-bg: #c23d3d;
      --header-text: #fff;
      --bg: #f6f8fa;
      --card-bg: #fff;
      --card-border: #e1e4e8;
      --text: #24292f;
      --text-muted: #57606a;
      --accent: #0969da;
      --accent-bg: #ddf4ff;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
      --shadow-hover: 0 4px 12px rgba(0,0,0,.1);
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      min-width: 380px;
      width: 380px;
      min-height: 520px;
      max-height: 560px;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .popup-header {
      flex-shrink: 0;
      padding: 14px 18px;
      background: var(--header-bg);
      color: var(--header-text);
    }
    .popup-header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .popup-header p {
      margin: 4px 0 0;
      font-size: 0.8rem;
      opacity: 0.9;
    }
    .popup-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .shortcut-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .shortcut-item {
      display: block;
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card-bg);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      transition: box-shadow .2s, border-color .2s;
      box-shadow: var(--shadow);
    }
    .shortcut-item:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-hover);
    }
    .shortcut-item .label-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .shortcut-item .shortcut-pill {
      flex-shrink: 0;
      padding: 3px 10px;
      border-radius: 14px;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
    }
    .shortcut-item .command-name {
      font-weight: 600;
      font-size: 0.95rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .shortcut-item .preview {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .loading {
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .empty-msg {
      padding: 24px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .popup-footer {
      flex-shrink: 0;
      padding: 12px 18px;
      border-top: 1px solid var(--card-border);
      background: var(--card-bg);
    }
    .popup-footer a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .popup-footer a:hover { text-decoration: underline; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header class="popup-header">
    <h1>OKACE คีย์ลัด</h1>
    <p>กดเพื่อแทรกข้อความลงในช่องที่เลือก</p>
  </header>
  <div class="popup-body">
    <div id="shortcutList" class="shortcut-list"></div>
    <p class="empty-msg hidden" id="emptyMsg">ยังไม่มีคำลัด ไปตั้งค่าใน Options เพื่อเพิ่มคำลัด</p>
  </div>
  <footer class="popup-footer">
    <a href="#" id="openOptions">⚙️ เปิดตั้งค่า</a>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
